name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      raw-increment:
        description: "Version increment (major, minor, patch, premajor, preminor, prepatch, or specific version)"
        required: false
        default: "auto"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  release:
    name: Release
    if: github.repository == 'sushichan044/cc-hooks-ts'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: write
      packages: write
      pull-requests: write
      issues: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug}}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Setup latest npm to use trusted publish
        run: |
          npm install -g npm@latest

      - name: Release with automatic version increment
        if: ${{ github.event.inputs.raw-increment == 'auto' }}
        run: pnpm exec release-it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release with specified version increment
        if: ${{ github.event.inputs.raw-increment != 'auto' }}
        run: pnpm exec release-it --increment=${{ github.event.inputs.raw-increment }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
